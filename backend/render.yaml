services:
  - type: web
    name: mams-backend
    env: python
    buildCommand: chmod +x build.sh && ./build.sh
    startCommand: gunicorn --config gunicorn_config.py mams.wsgi:application
    envVars:
      - key: PYTHON_VERSION
        value: 3.11.0
      - key: SECRET_KEY
        generateValue: true
      - key: DEBUG
        value: False
      - key: USE_SQLITE
        value: False
      - key: DB_NAME
        fromDatabase:
          name: mams-db
          property: database
      - key: DB_USER
        fromDatabase:
          name: mams-db
          property: user
      - key: DB_PASSWORD
        fromDatabase:
          name: mams-db
          property: password
      - key: DB_HOST
        fromDatabase:
          name: mams-db
          property: host
      - key: DB_PORT
        fromDatabase:
          name: mams-db
          property: port
      - key: ALLOWED_HOSTS
        value: mams-backend.onrender.com
      - key: CORS_ALLOWED_ORIGINS
        value: https://your-frontend-domain.vercel.app

databases:
  - name: mams-db
    databaseName: mams
    user: mams_user
    plan: free


